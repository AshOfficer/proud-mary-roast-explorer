<script>
const RN=["Melbourne","Portland","Austin"];
const COL=["#2979C2","#1B9E5E","#A535C4"];

const CAT_BOTTOM=new Set(['CURIOUS ESP','WILD ESP','DELUXE ESP','MILD FIL']);
function sortCats(cats){
  const main=cats.filter(c=>!CAT_BOTTOM.has(c)).sort((a,b)=>a.localeCompare(b));
  const btm=cats.filter(c=>CAT_BOTTOM.has(c)).sort((a,b)=>a.localeCompare(b));
  return{main,btm,all:[...main,...btm]};
}

// ── Varietal extraction ──────────────────────────────────────────────────────
const KNOWN_VARIETALS=new Set([
  'Bourbon','Red Bourbon','Yellow Bourbon','Pink Bourbon','Orange Bourbon','Peaberry Bourbon',
  'Typica','Blue Mountain','Kent','Pluma Hidalgo','Bergundal','Sidikalang','Kona','Jamaican Blue Mountain','Ethiopian Typica',
  'Catuai','Red Catuai','Yellow Catuai','Catucai','Red Catucai','Yellow Catucai',
  'Caturra','Red Caturra','Yellow Caturra','Mundo Novo',
  'Pacas','Pacamara','Geisha','Gesha','Maragogipe','Maracaturra',
  'SL28','SL34','SL-28','SL-34','Ruiru 11','Batian','K7',
  'Heirloom','Kurume','JARC','Dega','Gimbi','Illubabor','Wush Wush','74110','74112','74158',
  'Parainema','Villa Sarchi','San Roque','Marsellesa','Sarchimor','Obata','Starmaya','Lempira','IHCAFE90','Costa Rica 95','Anacafe 14','Anacafe-14',
  'Laurina','Mokka','Moka','Sudan Rume','Welo Abaya','Mokkita','Afrocina','Bernardina',
  'Castillo','Colombia','Tabi','Arara','Acaua','Acauã','Topazio','Topázio','Icatu','Tupi','Catiguá','Sabiá','Catigua','Sabia',
  'Arusha','Khawlani','Hybrido de Timor','Timor Hybrid','HDT','Cenicafe 1',
  'Maragaturra','Java','Pache','Pache Colis','Pache Común','Guji','Agaro','Jimma',
  'Typica Mejorado','Mixed','Unknown',
]);
const VARIETAL_ALIAS={
  'SL 28':'SL28','SL 34':'SL34','GESHA':'Geisha',
  'ACAUA':'Acauã','TOPAZIO':'Topázio','CATIGUA':'Catiguá','SABIA':'Sabiá','ANACAFE 14':'Anacafe-14',
};
function extractVarietal(profile){
  if(!profile)return'Unknown';
  const pu=' '+profile.toUpperCase()+' ';
  if(pu.indexOf('FAMILIA PACAS')>=0){
    const after=pu.replace('FAMILIA PACAS','');
    if(/[^A-Z]PACAS[^A-Z]/.test(after))return'Pacas';
    return'Unknown';
  }
  for(const [alias,canon] of Object.entries(VARIETAL_ALIAS)){
    const pat=new RegExp('[^A-Z]'+alias.toUpperCase().replace(/[^A-Z0-9]/g,'[^A-Z0-9]?')+'[^A-Z]');
    if(pat.test(pu))return canon;
  }
  const sorted=[...KNOWN_VARIETALS].sort((a,b)=>b.length-a.length);
  for(const v of sorted){
    const puH=pu.replace(/-/g,' ');
    const vuH=' '+v.toUpperCase().replace(/-/g,' ')+' ';
    if(puH.includes(vuH))return v;
  }
  return'Unknown';
}

// ── Category normalisation ───────────────────────────────────────────────────
const CAT_NORM={
  'CURIOUS FIL':'CURIOUS','WILD FIL':'WILD','DELUXE FIL':'DELUXE','MILD ESP':'MILD',
  'GHOST':'GHOST RIDER','ANGEL':'ANGEL WINGS','DECAF SPRO':'DECAF',
  'GHOST RIDER':'GHOST RIDER','ANGEL WINGS':'ANGEL WINGS'
};
function normCat(c){return CAT_NORM[c.toUpperCase()]||c;}

// ── Process extraction from profile string ───────────────────────────────────
// Checks for process keywords in the profile name (e.g. "CST Geisha Anaerobic Washed 6KG WILD")
// Order matters — longer/more-specific patterns checked first.
// Returns canonical process name, or null if nothing matched (fallback to sheet process column).
const PROFILE_PROCESS_PATTERNS=[
  // Carbonic Maceration — check before generic washed/honey/natural
  [/CARBONIC\s+MA(?:C|SC)ERATION\s+WASHED|CM\s+WASHED/,   'CM Washed'],
  [/CARBONIC\s+MA(?:C|SC)ERATION\s+HONEY|CM\s+HONEY/,     'CM Honey'],
  [/CARBONIC\s+MA(?:C|SC)ERATION\s+NATURAL|CM\s+NATURAL/, 'CM Natural'],
  [/CARBONIC\s+MA(?:C|SC)ERATION/,                         'CM Washed'],

  // Anaerobic — check before generic washed/honey/natural
  // Covers: Anaerobic Washed, A. Washed, AW, Dbl Anaerobic Washed, Double A. Washed, etc.
  [/(?:DBL\.?\s+|DOUBLE\s+|DUO\s+|2X\s+|TRIPLE\s+|3X\s+)?(?:ANAEROBIC|A\.)\s+WASHED/, 'Anaerobic Washed'],
  [/(?:DBL\.?\s+|DOUBLE\s+|DUO\s+|2X\s+|TRIPLE\s+|3X\s+)?(?:ANAEROBIC|A\.)\s+HONEY/,  'Anaerobic Honey'],
  [/(?:DBL\.?\s+|DOUBLE\s+|DUO\s+|2X\s+|TRIPLE\s+|3X\s+)?(?:ANAEROBIC|A\.)\s+NATURAL/,'Anaerobic Natural'],
  // Bare ANAEROBIC with no sub-type
  [/\bANAEROBIC\b/,                                    'Anaerobic Washed'],

  // Depulped
  [/\bDE.?PULPED\b/,                                   'Depulped'],

  // Honey variants — specific first
  [/\bBLACK\s+HONEY\b/,  'Black Honey'],
  [/\bRED\s+HONEY\b/,    'Red Honey'],
  [/\bYELLOW\s+HONEY\b/, 'Yellow Honey'],
  [/\bHONEY\b/,          'Honey'],

  // Natural
  [/\bNATURAL\b/,        'Natural'],

  // Washed
  [/\bWASHED\b/,         'Washed'],
];

// Also normalise sheet process column values (fallback when profile has nothing)
const SHEET_PROCESS_NORM={
  'WASHED':'Washed','WET':'Washed',
  'NATURAL':'Natural',
  'HONEY':'Honey','BLACK HONEY':'Black Honey','RED HONEY':'Red Honey','YELLOW HONEY':'Yellow Honey',
  'ANAEROBIC':'Anaerobic Washed','ANAEROBIC WASHED':'Anaerobic Washed',
  'ANAEROBIC HONEY':'Anaerobic Honey','ANAEROBIC NATURAL':'Anaerobic Natural',
  'A. WASHED':'Anaerobic Washed','AW':'Anaerobic Washed',
  'A. HONEY':'Anaerobic Honey','AH':'Anaerobic Honey',
  'A. NATURAL':'Anaerobic Natural','AN':'Anaerobic Natural',
  'CM WASHED':'CM Washed','CM HONEY':'CM Honey','CM NATURAL':'CM Natural',
  'CARBONIC MACERATION':'CM Washed','CARBONIC MASCERATION':'CM Washed',
  'DEPULPED':'Depulped','DE-PULPED':'Depulped',
};

function extractProcess(profile, sheetProcess){
  // 1. Try to extract from profile string (most reliable source)
  if(profile){
    const pu=profile.toUpperCase();
    for(const [pat,canon] of PROFILE_PROCESS_PATTERNS){
      if(pat.test(pu)) return canon;
    }
  }
  // 2. Fall back to sheet process column value, normalised
  if(sheetProcess){
    const su=sheetProcess.trim().toUpperCase();
    if(SHEET_PROCESS_NORM[su]) return SHEET_PROCESS_NORM[su];
    // Return the raw sheet value (title-cased) if nothing matched
    return sheetProcess.trim();
  }
  return '';
}

// ── Data loading ─────────────────────────────────────────────────────────────
const SHEET_URLS={
  Melbourne:'https://docs.google.com/spreadsheets/d/e/2PACX-1vRj7S1FDEpC0_SvZtQBfNlGBLilquJ6YCLzg8So-CSZ4Wk07HbjtcK9z6l8CV7rj5lNEDf1rulD1wb8/pub?gid=0&single=true&output=csv',
  Portland: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRj7S1FDEpC0_SvZtQBfNlGBLilquJ6YCLzg8So-CSZ4Wk07HbjtcK9z6l8CV7rj5lNEDf1rulD1wb8/pub?gid=1345419856&single=true&output=csv',
  Austin:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vRj7S1FDEpC0_SvZtQBfNlGBLilquJ6YCLzg8So-CSZ4Wk07HbjtcK9z6l8CV7rj5lNEDf1rulD1wb8/pub?gid=575438985&single=true&output=csv'
};
const COL_MAP={
  origin:['origin'],process:['process'],category:['group','category'],
  wb:['wb'],gb:['gb'],machine:['machine'],profile:['profile']
};
function findCol(headers,keys){
  const hl=headers.map(h=>h.toLowerCase().trim());
  for(const k of keys){const i=hl.indexOf(k);if(i>=0)return i;}
  return -1;
}
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return[];
  function parseLine(line){
    const fields=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){fields.push(cur.trim());cur='';}else cur+=c;
    }
    fields.push(cur.trim());return fields;
  }
  const headers=parseLine(lines[0]);
  const iOrigin=findCol(headers,COL_MAP.origin);
  const iProcess=findCol(headers,COL_MAP.process);
  const iCat=findCol(headers,COL_MAP.category);
  const iWb=findCol(headers,COL_MAP.wb);
  const iGb=findCol(headers,COL_MAP.gb);
  const iMachine=findCol(headers,COL_MAP.machine);
  const iProfile=findCol(headers,COL_MAP.profile);
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const f=parseLine(lines[i]);
    if(f.length<3)continue;
    const wb=parseFloat(f[iWb]);
    const gb=parseFloat(f[iGb]);
    const profileVal=iProfile>=0?(f[iProfile]||'').trim():'';
    const sheetProcess=iProcess>=0?(f[iProcess]||'').trim():'';
    rows.push({
      origin:   iOrigin>=0?(f[iOrigin]||'').trim().toUpperCase().slice(0,3):'',
      varietal: extractVarietal(profileVal),
      process:  extractProcess(profileVal, sheetProcess),
      category: iCat>=0?normCat((f[iCat]||'').trim()):'',
      wb:       isNaN(wb)?null:wb,
      gb:       isNaN(gb)?null:gb,
      machine:  iMachine>=0?(f[iMachine]||'').trim()||null:null,
    });
  }
  return rows;
}

let RAW=[];
async function loadAllSheets(){
  showLoading(true);
  const entries=Object.entries(SHEET_URLS);
  const results=await Promise.allSettled(
    entries.map(([name,url])=>fetch(url).then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.text();}).then(text=>({name,text})))
  );
  RAW=[];
  results.forEach((res,idx)=>{
    if(res.status==='fulfilled'){
      const rows=parseCSV(res.value.text);
      rows.forEach(r=>{
        if(!r.category||r.category==='BLEND')return;
        RAW.push([idx,r.origin,r.varietal,r.process,r.category,r.wb,r.gb,r.machine]);
      });
    } else {
      console.warn(`Failed to load ${entries[idx][0]}:`,res.reason);
    }
  });
  showLoading(false);
  rebuildOptions();rTB();go();
}

function showLoading(on,msg){
  let el=document.getElementById('pm-loading');
  if(!el){el=document.createElement('div');el.id='pm-loading';el.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,35,64,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px';document.body.appendChild(el);}
  if(on){el.innerHTML=`<div style="font-family:'Black Ops One',serif;font-size:20px;color:#F5C842;letter-spacing:.06em">${msg||'Loading Roast Data...'}</div><div style="font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(255,255,255,.5)">Fetching from Google Sheets</div>`;el.style.display='flex';}
  else el.style.display='none';
}

function rebuildOptions(){
  function uniqIdx(i){return[...new Set(RAW.map(d=>d[i]).filter(v=>v&&v!=='Unknown'&&v!==null))].sort();}
  OL.o=uniqIdx(1);OL.v=uniqIdx(2);OL.p=uniqIdx(3);OL.c=uniqIdx(4);OL.m=uniqIdx(7);
  F={r:null,o:null,v:null,p:null,c:null,m:null};
}

const OL={r:RN,o:[],v:[],p:[],c:[],m:[]};
let F={r:null,o:null,v:null,p:null,c:null,m:null};
let GB='c',TAB='chart',CI=null;

function iAll(k){return F[k]===null;}
function iNone(k){return Array.isArray(F[k])&&F[k].length===0;}
function sel(k){if(iAll(k))return new Set(OL[k]);if(iNone(k))return new Set();return new Set(F[k]);}
function badge(k){if(iAll(k))return'All';if(iNone(k))return'None';return''+F[k].length;}

function applyF(){
  if(['r','o','v','p','c','m'].some(k=>iNone(k)))return[];
  return RAW.filter(d=>{
    if(!iAll('r')&&!sel('r').has(RN[d[0]]))return false;
    if(!iAll('o')&&!sel('o').has(d[1]))return false;
    if(!iAll('v')&&!sel('v').has(d[2]))return false;
    if(!iAll('p')&&!sel('p').has(d[3]))return false;
    if(!iAll('c')&&!sel('c').has(d[4]))return false;
    if(!iAll('m')&&d[7]&&!sel('m').has(d[7]))return false;
    return true;
  });
}

function st(arr){
  const v=arr.filter(x=>x!=null);
  if(!v.length)return null;
  const avg=v.reduce((a,b)=>a+b,0)/v.length;
  return{avg,min:Math.min(...v),max:Math.max(...v)};
}

function grp(data){
  const ki={r:0,o:1,v:2,p:3,c:4}[GB]??4;
  const g={};
  data.forEach(d=>{
    const k=GB==='r'?RN[d[0]]:(d[ki]||'Unknown');
    if(!g[k])g[k]={};
    const rn=RN[d[0]];
    if(!g[k][rn])g[k][rn]={wb:[],gb:[]};
    if(d[5]!=null)g[k][rn].wb.push(d[5]);
    if(d[6]!=null)g[k][rn].gb.push(d[6]);
  });
  return g;
}

function sortedLabels(g){
  const all=Object.keys(g);
  if(GB!=='c')return{labels:all.sort((a,b)=>a.localeCompare(b)),firstBottom:-1};
  const sc=sortCats(all);
  return{labels:sc.all,firstBottom:sc.btm.length>0?sc.main.length:-1};
}

function pvClass(d){return d<=2?'pv0':d<=4?'pv1':'pv2';}

function buildFC(id,fk,lbl){
  const s=sel(fk);const b=badge(fk);
  let opts='';
  if(fk==='c'){
    const sc=sortCats(OL[fk]);
    opts=sc.main.map(o=>fcOpt(fk,o,s,id)).join('');
    if(sc.btm.length){opts+=`<div class="sep-row"></div>`;opts+=sc.btm.map(o=>fcOpt(fk,o,s,id)).join('');}
  } else {
    opts=OL[fk].map(o=>fcOpt(fk,o,s,id)).join('');
  }
  return`<div class="fc"><div class="fc-lbl">${lbl}</div>
    <button class="fc-btn" id="btn-${id}" onclick="tFC('${id}')">${lbl} <span class="fc-badge">${b}</span> ▾</button>
    <div class="fc-panel" id="${id}">
      <input class="fc-search" placeholder="Search..." oninput="fFC('${id}',this.value)">
      <div class="fc-acts"><button onclick="doAll('${fk}','${id}')">All</button><button onclick="doNone('${fk}','${id}')">None</button></div>
      <div class="fc-opts" id="${id}-l">${opts}</div>
    </div></div>`;
}
function fcOpt(fk,o,s,id){
  const esc=o.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return`<label class="fc-opt"><input type="checkbox" ${s.has(o)?'checked':''} onchange="togO('${fk}','${esc}',this.checked,'${id}')">${o}</label>`;
}
function rTB(){
  const gbK=['c','o','v','p','r'],gbL={c:'Category',o:'Origin',v:'Varietal',p:'Process',r:'Roastery'};
  document.getElementById('tb').innerHTML=
    [['r','Roastery'],['o','Origin'],['v','Varietal'],['p','Process'],['c','Category'],['m','Machine']].map(([k,l])=>buildFC('dd-'+k,k,l)).join('')+
    `<div class="fc" style="max-width:120px"><div class="fc-lbl">Group by</div><select class="gb-select" onchange="setGB(this.value)">${gbK.map(k=>`<option value="${k}"${k===GB?' selected':''}>${gbL[k]}</option>`).join('')}</select></div>`;
}
function tFC(id){
  const panel=document.getElementById(id),btn=document.getElementById('btn-'+id);
  const isOpen=panel.classList.contains('open');
  document.querySelectorAll('.fc-panel').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('.fc-btn').forEach(b=>b.classList.remove('open'));
  if(!isOpen){panel.classList.add('open');btn.classList.add('open');}
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.fc')){
    document.querySelectorAll('.fc-panel').forEach(p=>p.classList.remove('open'));
    document.querySelectorAll('.fc-btn').forEach(b=>b.classList.remove('open'));
  }
});
function fFC(id,q){document.querySelectorAll('#'+id+'-l .fc-opt').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';});}
function doAll(fk,id){F[fk]=null;document.querySelectorAll('#'+id+'-l input').forEach(i=>i.checked=true);go();}
function doNone(fk,id){F[fk]=[];document.querySelectorAll('#'+id+'-l input').forEach(i=>i.checked=false);go();}
function togO(fk,val,chk,id){const cur=sel(fk);if(chk)cur.add(val);else cur.delete(val);F[fk]=cur.size===OL[fk].length?null:[...cur];go();}
function setGB(v){GB=v;go();}
function setTab(t){
  TAB=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.textContent.toLowerCase()===t));
  document.querySelectorAll('.vw').forEach(el=>el.classList.remove('active'));
  document.getElementById(t+'-vw').classList.add('active');go();
}

function rMets(data){
  const rs=new Set(data.map(d=>d[0])).size;
  const wbs=data.map(d=>d[5]).filter(x=>x!=null);
  const gbs=data.map(d=>d[6]).filter(x=>x!=null);
  const aw=wbs.length?(wbs.reduce((a,b)=>a+b,0)/wbs.length).toFixed(1):'—';
  const ag=gbs.length?(gbs.reduce((a,b)=>a+b,0)/gbs.length).toFixed(1):'—';
  document.getElementById('mets').innerHTML=`
    <div class="met"><div class="ml">Roasts</div><div class="mv">${data.length}</div></div>
    <div class="met"><div class="ml">Roasteries</div><div class="mv">${rs}</div></div>
    <div class="met"><div class="ml">Avg WB</div><div class="mv">${aw}</div></div>
    <div class="met"><div class="ml">Avg GB</div><div class="mv">${ag}</div></div>`;
}

function actRi(){return[0,1,2].filter(i=>sel('r').has(RN[i]));}

function rChart(data){
  const g=grp(data);
  const {labels,firstBottom}=sortedLabels(g);
  const aRi=actRi();
  const wrap=document.getElementById('cwrap');
  if(!labels.length){if(CI){CI.destroy();CI=null;}wrap.innerHTML='<div class="nd">No data for this selection</div>';return;}
  if(CI){CI.destroy();CI=null;}
  wrap.innerHTML='<canvas id="mc"></canvas>';
  const canvas=document.getElementById('mc');
  const ctx=canvas.getContext('2d');

  function gaussKde(vals,x,bw){return vals.reduce((s,v)=>{const u=(x-v)/bw;return s+Math.exp(-0.5*u*u);},0)/(vals.length*bw*2.507);}
  function buildKde(vals,steps=100){
    if(!vals||vals.length<2)return null;
    const mn=Math.min(...vals),mx=Math.max(...vals);
    const spread=mx-mn||2;const bw=Math.max(1.0,spread*0.12);
    const lo=mn,hi=mx,step=(hi-lo)/steps;const pts=[];
    for(let v=lo;v<=hi+1e-9;v+=step)pts.push({x:v,d:gaussKde(vals,v,bw)});
    const peak=Math.max(...pts.map(p=>p.d))||1;
    return pts.map(p=>({x:p.x,d:p.d/peak}));
  }

  const specs=[];
  labels.forEach(l=>{
    aRi.forEach(i=>{
      const wbVals=(g[l][RN[i]]||{wb:[]}).wb.filter(v=>v!=null);
      const gbVals=(g[l][RN[i]]||{gb:[]}).gb.filter(v=>v!=null);
      const wbS=st(wbVals),gbS=st(gbVals);
      const spread=(wbS&&gbS)?+(gbS.avg-wbS.avg).toFixed(2):null;
      ['wb','gb'].forEach(key=>{
        const vals=key==='wb'?wbVals:gbVals;const s=key==='wb'?wbS:gbS;
        if(!s)return;
        specs.push({label:l,ri:i,key,vals,avg:+s.avg.toFixed(2),mn:s.min,mx:s.max,kdePts:buildKde(vals),col:COL[i],n:vals.length,spread});
      });
    });
  });

  const ML=110,MR=20,MT=30,MB=36,VH=18,RG=6,RH=VH*2+RG,GG=10;
  const chartH=MT+MB+labels.length*aRi.length*2*RH+labels.length*GG;
  const dpr=window.devicePixelRatio||1;
  wrap.style.height=Math.max(300,chartH)+'px';
  canvas.style.width='100%';canvas.style.height=Math.max(300,chartH)+'px';

  function resize(){const W=wrap.clientWidth;canvas.width=W*dpr;canvas.height=Math.max(300,chartH)*dpr;ctx.scale(dpr,dpr);draw(W);}

  let allVals=[];specs.forEach(sp=>allVals.push(...sp.vals));
  const gMin=Math.min(...allVals),gMax=Math.max(...allVals);
  const xPad=(gMax-gMin)*0.02,xMin=gMin-xPad,xMax=gMax+xPad;
  function toX(v,W){return ML+(v-xMin)/(xMax-xMin)*(W-ML-MR);}

  function buildRowMap(){
    const map={};let y=MT;
    labels.forEach((l,li)=>{
      if(li>0)y+=GG;map[l]={};
      aRi.forEach(i=>{map[l][i]={};['wb','gb'].forEach(key=>{map[l][i][key]=y+VH;y+=RH;});});
    });
    return map;
  }

  let hoverSpec=null;
  function draw(W){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const rowMap=buildRowMap();
    // Grid
    ctx.strokeStyle='rgba(26,35,64,.06)';ctx.lineWidth=1;ctx.fillStyle='#888';ctx.font='9px "DM Sans",sans-serif';ctx.textAlign='center';
    for(let t=0;t<=6;t++){
      const v=xMin+t*(xMax-xMin)/6,px=toX(v,W);
      ctx.beginPath();ctx.moveTo(px,MT-8);ctx.lineTo(px,Math.max(300,chartH)-MB+4);ctx.stroke();
      ctx.fillText(v.toFixed(0),px,Math.max(300,chartH)-MB+14);
    }
    ctx.fillText('Light Tells',ML+(W-ML-MR)/2,Math.max(300,chartH)-4);
    // Separator
    if(firstBottom>-1){
      let sepY=MT;
      labels.forEach((l,li)=>{
        if(li>0)sepY+=GG;sepY+=aRi.length*2*RH;
        if(li===firstBottom-1){
          ctx.save();ctx.strokeStyle='rgba(26,35,64,0.25)';ctx.lineWidth=1.5;ctx.setLineDash([5,3]);
          ctx.beginPath();ctx.moveTo(ML,sepY+GG/2);ctx.lineTo(W-MR,sepY+GG/2);ctx.stroke();
          ctx.setLineDash([]);ctx.restore();
        }
      });
    }
    // Y labels
    ctx.textAlign='right';ctx.fillStyle='#1A2340';ctx.font='600 10px "DM Sans",sans-serif';
    labels.forEach(l=>{
      const ri0=aRi[0],lastRi=aRi[aRi.length-1];
      const midY=(rowMap[l][ri0].wb+rowMap[l][lastRi].gb)/2;
      ctx.fillText(l.length>16?l.slice(0,15)+'…':l,ML-6,midY+3);
    });
    // Violins
    specs.forEach(sp=>{
      if(!rowMap[sp.label]||!rowMap[sp.label][sp.ri])return;
      const midY=rowMap[sp.label][sp.ri][sp.key];
      const kdePts=sp.kdePts,col=sp.col,alpha=sp.key==='gb'?0.40:0.65;
      if(kdePts&&kdePts.length>1){
        ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=col;
        ctx.beginPath();ctx.moveTo(toX(kdePts[0].x,W),midY-kdePts[0].d*VH);
        kdePts.forEach(p=>ctx.lineTo(toX(p.x,W),midY-p.d*VH));
        [...kdePts].reverse().forEach(p=>ctx.lineTo(toX(p.x,W),midY+p.d*VH));
        ctx.closePath();ctx.fill();
        ctx.globalAlpha=alpha+0.25;ctx.strokeStyle=col;ctx.lineWidth=0.8;
        ctx.beginPath();kdePts.forEach((p,k)=>{k===0?ctx.moveTo(toX(p.x,W),midY-p.d*VH):ctx.lineTo(toX(p.x,W),midY-p.d*VH);});
        [...kdePts].reverse().forEach((p,k)=>{k===0?ctx.moveTo(toX(p.x,W),midY+p.d*VH):ctx.lineTo(toX(p.x,W),midY+p.d*VH);});
        ctx.stroke();ctx.restore();
      }
      const avgPx=toX(sp.avg,W);
      ctx.save();ctx.globalAlpha=0.95;ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(avgPx,midY-VH*0.65);ctx.lineTo(avgPx,midY+VH*0.65);ctx.stroke();
      ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.globalAlpha=1;
      ctx.beginPath();ctx.moveTo(avgPx,midY-VH*0.65);ctx.lineTo(avgPx,midY+VH*0.65);ctx.stroke();
      ctx.restore();
    });
    // Hover tooltip
    if(hoverSpec){
      const sp=hoverSpec;
      if(rowMap[sp.label]&&rowMap[sp.label][sp.ri]){
        const midY=rowMap[sp.label][sp.ri][sp.key],avgPx=toX(sp.avg,W);
        ctx.save();ctx.globalAlpha=1;ctx.fillStyle=sp.col;
        ctx.beginPath();ctx.arc(avgPx,midY,5,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
        const lines=[`${RN[sp.ri]} ${sp.key.toUpperCase()}`,`avg: ${sp.avg}`,`range: ${sp.mn.toFixed(0)}–${sp.mx.toFixed(0)}`,
          ...(sp.spread!==null?[`spread: ${sp.spread>0?'+':''}${sp.spread}`]:[]),`n = ${sp.n}`];
        const TW=148,TH=lines.length*15+12;
        let TX=avgPx+10,TY=midY-TH/2;
        if(TX+TW>W-MR)TX=avgPx-TW-10;if(TY<2)TY=2;
        ctx.save();ctx.globalAlpha=0.95;ctx.fillStyle='#1A2340';ctx.beginPath();ctx.roundRect(TX,TY,TW,TH,5);ctx.fill();
        ctx.globalAlpha=1;ctx.fillStyle='#F5C842';ctx.font='700 10px "DM Sans",sans-serif';ctx.textAlign='left';ctx.fillText(lines[0],TX+8,TY+14);
        ctx.fillStyle='#fff';ctx.font='10px "DM Sans",sans-serif';lines.slice(1).forEach((ln,i)=>ctx.fillText(ln,TX+8,TY+28+i*14));
        ctx.restore();
      }
    }
  }

  canvas.addEventListener('mousemove',e=>{
    const rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const W=wrap.clientWidth,rowMap=buildRowMap();
    let found=null,bestD=Infinity;
    specs.forEach(sp=>{
      if(!rowMap[sp.label]||!rowMap[sp.label][sp.ri])return;
      const midY=rowMap[sp.label][sp.ri][sp.key];
      if(Math.abs(my-midY)>VH+4)return;
      if(!sp.kdePts||!sp.kdePts.length)return;
      const loX=toX(sp.kdePts[0].x,W),hiX=toX(sp.kdePts[sp.kdePts.length-1].x,W);
      if(mx<Math.min(loX,hiX)-4||mx>Math.max(loX,hiX)+4)return;
      const d=Math.abs(mx-toX(sp.avg,W));if(d<bestD){bestD=d;found=sp;}
    });
    hoverSpec=found;ctx.setTransform(dpr,0,0,dpr,0,0);draw(W);
  });
  canvas.addEventListener('mouseleave',()=>{hoverSpec=null;ctx.setTransform(dpr,0,0,dpr,0,0);draw(wrap.clientWidth);});
  resize();

  document.getElementById('cleg').innerHTML=aRi.map(i=>`
    <span style="display:flex;align-items:center;gap:5px">
      <span style="display:flex;flex-direction:column;gap:2px">
        <span style="width:26px;height:7px;border-radius:3px;background:${COL[i]};display:block"></span>
        <span style="width:26px;height:7px;border-radius:3px;background:${COL[i]}66;display:block"></span>
      </span>
      <span style="display:flex;flex-direction:column;gap:1px;font-size:10px;font-weight:700;color:${COL[i]}">
        <span>${RN[i]} WB</span><span style="opacity:.7">${RN[i]} GB</span>
      </span>
    </span>`).join('');
}

function rTable(data){
  const g=grp(data),{labels,firstBottom}=sortedLabels(g),aRi=actRi();
  let h=`<thead><tr><th>Group</th>`;
  aRi.forEach(i=>{h+=`<th style="color:${COL[i]}">${RN[i]} WB avg</th><th style="color:${COL[i]}">${RN[i]} GB avg</th>`;});
  if(aRi.length>1)h+=`<th style="color:var(--pm-cyan)">WB spread</th><th style="color:var(--pm-yellow)">GB spread</th>`;
  h+=`</tr></thead><tbody>`;
  if(!labels.length)h+=`<tr><td colspan="20" class="nd">No data</td></tr>`;
  labels.forEach((l,idx)=>{
    const sepClass=(firstBottom>-1&&idx===firstBottom)?' class="sep-tr"':'';
    h+=`<tr${sepClass}><td style="font-weight:500">${l}</td>`;
    const wa=[],ga=[];
    aRi.forEach(i=>{
      const rn=RN[i],sw=st((g[l][rn]||{wb:[]}).wb),sg=st((g[l][rn]||{gb:[]}).gb);
      if(sw)wa.push(sw.avg);if(sg)ga.push(sg.avg);
      const nw=(g[l][rn]||{wb:[]}).wb.length,ng=(g[l][rn]||{gb:[]}).gb.length;
      h+=`<td>${sw?sw.avg.toFixed(1)+' <span style="font-size:10px;color:#888">('+sw.min.toFixed(0)+'–'+sw.max.toFixed(0)+')</span><span style="font-size:9px;color:#49BFCE;margin-left:3px;font-weight:700">n='+nw+'</span>':'—'}</td>`;
      h+=`<td>${sg?sg.avg.toFixed(1)+' <span style="font-size:10px;color:#888">('+sg.min.toFixed(0)+'–'+sg.max.toFixed(0)+')</span><span style="font-size:9px;color:#49BFCE;margin-left:3px;font-weight:700">n='+ng+'</span>':'—'}</td>`;
    });
    if(aRi.length>1){
      if(wa.length>1){const d=Math.max(...wa)-Math.min(...wa);h+=`<td><span class="pill ${pvClass(d)}">±${d.toFixed(1)}</span></td>`;}else h+=`<td>—</td>`;
      if(ga.length>1){const d=Math.max(...ga)-Math.min(...ga);h+=`<td><span class="pill ${pvClass(d)}">±${d.toFixed(1)}</span></td>`;}else h+=`<td>—</td>`;
    }
    h+=`</tr>`;
  });
  document.getElementById('mt').innerHTML=h+'</tbody>';
}

function rVar(data){
  const g=grp(data),{labels,firstBottom}=sortedLabels(g),aRi=actRi(),melI=0,hasMel=aRi.includes(melI);
  const cards=labels.map((l,idx)=>{
    const rd=g[l]||{};
    const melSw=hasMel?st((rd[RN[melI]]||{wb:[]}).wb):null;
    const melSg=hasMel?st((rd[RN[melI]]||{gb:[]}).gb):null;
    const rows=aRi.map(i=>({i,sw:st((rd[RN[i]]||{wb:[]}).wb),sg:st((rd[RN[i]]||{gb:[]}).gb)})).filter(x=>x.sw||x.sg);
    const wbRows=rows.filter(x=>x.sw);if(wbRows.length<2)return null;
    const avgs=wbRows.map(x=>x.sw.avg);
    return{l,rd,rows,spread:Math.max(...avgs)-Math.min(...avgs),melSw,melSg,isSep:firstBottom>-1&&idx===firstBottom};
  }).filter(Boolean);
  if(!cards.length){document.getElementById('vg').innerHTML='<div class="nd">Select 2+ roasteries to compare</div>';return;}
  function fmtAvg(s){return s?s.avg.toFixed(1):'—';}
  function fmtRange(s){return s?`<span style="font-size:10px;color:#888">(${s.min.toFixed(0)}–${s.max.toFixed(0)})</span>`:'';}
  function diffPill(s,ref){if(!s||!ref)return'';const d=Math.abs(s.avg-ref.avg);return`<span class="pill ${pvClass(d)}">±${d.toFixed(1)}</span>`;}
  let html='',sepInserted=false;
  cards.forEach(({l,rd,rows,spread,melSw,melSg,isSep})=>{
    if(isSep&&!sepInserted){sepInserted=true;html+=`<div style="grid-column:1/-1;border-top:1.5px solid #E8DCC8;margin:4px 0"></div>`;}
    const sorted=[...rows].sort((a,b)=>(a.i===melI?-1:b.i===melI?1:a.i-b.i));
    let tableRows='';
    sorted.forEach(({i,sw,sg},idx)=>{
      const isMel=i===melI;
      const nwv=(rd[RN[i]]||{wb:[]}).wb.length,ngv=(rd[RN[i]]||{gb:[]}).gb.length;
      tableRows+=`<tr style="${!isMel&&idx===1&&hasMel?'border-top:0.5px solid #E8DCC8':''}">
        <td style="color:${COL[i]};font-weight:${isMel?'600':'500'};white-space:nowrap">${RN[i]}</td>
        <td>${fmtAvg(sw)}</td><td>${fmtRange(sw)}<span style="font-size:9px;color:#49BFCE;font-weight:700;margin-left:2px">${nwv?'n='+nwv:''}</span></td>
        <td class="wb-col">${!isMel&&hasMel?diffPill(sw,melSw):''}</td>
        <td>${fmtAvg(sg)}</td><td>${fmtRange(sg)}<span style="font-size:9px;color:#49BFCE;font-weight:700;margin-left:2px">${ngv?'n='+ngv:''}</span></td>
        <td>${!isMel&&hasMel?diffPill(sg,melSg):''}</td>
      </tr>`;
    });
    html+=`<div class="vc">
      <div class="vt"><span>${l}</span><span class="pill ${pvClass(spread)}">±${spread.toFixed(1)}</span></div>
      <table class="vcard-tbl"><thead><tr>
        <th></th><th colspan="3" class="wb-group">WB</th><th colspan="3" class="gb-group">GB</th>
      </tr><tr>
        <th></th><th>avg</th><th>range</th><th class="wb-col">vs Mel</th><th>avg</th><th>range</th><th>vs Mel</th>
      </tr></thead><tbody>${tableRows}</tbody></table>
    </div>`;
  });
  document.getElementById('vg').innerHTML=html;
}

function rAFS(){
  const keys=[['r','Roastery'],['o','Origin'],['p','Process'],['v','Varietal'],['c','Category'],['m','Machine']];
  const parts=[];
  keys.forEach(([k,lbl])=>{
    if(iAll(k))return;
    if(iNone(k)){parts.push(`<span class="afc"><span class="afc-k">${lbl}:</span>none</span>`);return;}
    if(F[k].length<=3)F[k].forEach(v=>parts.push(`<span class="afc"><span class="afc-k">${lbl}:</span>${v}</span>`));
    else parts.push(`<span class="afc"><span class="afc-k">${lbl}:</span>${F[k].length} selected</span>`);
  });
  const el=document.getElementById('afs');
  el.innerHTML=parts.length?`<span class="aft">Showing:</span>`+parts.join(''):'';
}

function go(){const data=applyF();rMets(data);rTB();rAFS();if(TAB==='chart')rChart(data);else if(TAB==='table')rTable(data);else rVar(data);}
loadAllSheets();
</script>
